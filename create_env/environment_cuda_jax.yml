# CUDA env for the braincoder benchmark — JAX backend.
#
# Build:
#   sbatch create_env/create_gpu_env.sh jax
#
# Activate + set the backend:
#   conda activate paper_braincoder_cuda_jax
#   export KERAS_BACKEND=jax
#
# Stack: Python 3.12 + Keras 3.13+ + JAX 0.4.30+. `jax[cuda12]`
# bundles its own CUDA libs via pip wheels.
#
# No tensorflow / tensorflow-probability here — braincoder gates its
# few `import tensorflow` paths (StimulusFitter, MCMC) behind
# try/except, and the PRF benchmark we run goes purely through
# Keras 3 → JAX.

name: paper_braincoder_cuda_jax
channels:
  - conda-forge

dependencies:
  - python=3.12
  - pip

  - numpy<2.3
  - scipy
  - pandas
  - matplotlib
  - seaborn
  - tqdm
  - pyyaml

  - nibabel
  - nilearn
  - pybids

  - jupyterlab
  - ipykernel
  - pytest

  - pip:
      - "jax[cuda12]>=0.4.30"
      - "keras>=3.13,<4"
      - "braincoder @ git+https://github.com/Gilles86/braincoder.git@main"
