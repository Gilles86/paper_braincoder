# CUDA env for the braincoder benchmark — TENSORFLOW backend.
#
# Build on a GPU compute node so bundled CUDA wheels link against the
# right NVIDIA driver:
#   sbatch create_env/create_gpu_env.sh tf
#
# Activate:
#   conda activate paper_braincoder_cuda
#   export KERAS_BACKEND=tensorflow   # the default; explicit for clarity
#
# Stack: Python 3.12 + Keras 3.13+ + TF 2.20.
# `tensorflow[and-cuda]==2.20.*` bundles its own CUDA libs via pip
# wheels, so no `module load cuda/...` is required.
#
# JAX and PyTorch backends live in separate envs (see
# environment_cuda_jax.yml, environment_cuda_torch.yml) — combining
# CUDA stacks in one env is unreliable in practice (cuDNN / cuBLAS
# version conflicts).

name: paper_braincoder_cuda
channels:
  - conda-forge

dependencies:
  - python=3.12
  - pip

  - numpy<2.3
  - scipy
  - pandas
  - matplotlib
  - seaborn
  - tqdm
  - pyyaml

  - nibabel
  - nilearn
  - pybids

  - jupyterlab
  - ipykernel
  - pytest

  - pip:
      - "tensorflow[and-cuda]==2.20.*"
      - "keras>=3.13,<4"
      - "tf_keras>=2.20"
      - "tensorflow-probability>=0.25"
      - protobuf>=4.21

      - "braincoder @ git+https://github.com/Gilles86/braincoder.git@main"
